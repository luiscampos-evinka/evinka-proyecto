name: protocolo_cargador
description: Protocolo de Instalación de Cargador

publish_to: 'none'
version: 1.0.51+51

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  pdf: ^3.10.8
  printing: ^5.12.0
  mobile_scanner: ^5.2.3
  path_provider: ^2.1.4
  share_plus: ^10.0.0
  intl: ^0.19.0
  signature: ^5.4.1
  permission_handler: ^11.3.1
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  image_picker: ^1.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  path_provider_android: 2.2.22

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
