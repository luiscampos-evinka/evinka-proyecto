plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.evinka.conformidad"
    compileSdkVersion flutter.compileSdkVersion
    flavorDimensions "country"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "com.evinka.suite"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
        resValue "string", "app_name", "EVINKA Suite PE"
        resValue "string", "evinka_country", "PE"
    }

    productFlavors {
        pe {
            dimension "country"
            applicationId "com.evinka.suite.pe"
            resValue "string", "app_name", "EVINKA Suite PE"
            resValue "string", "evinka_country", "PE"
            versionNameSuffix "-pe"
        }
        co {
            dimension "country"
            applicationId "com.evinka.suite.co"
            resValue "string", "app_name", "EVINKA Suite CO"
            resValue "string", "evinka_country", "CO"
            versionNameSuffix "-co"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source "../.."
}

apply plugin: 'com.google.gms.google-services'
